<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ayush Amrit — CSE Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'JetBrains Mono',monospace;background:#06080f;color:#c0cce0;overflow-x:hidden;line-height:1.6}
a{color:inherit;text-decoration:none}button{cursor:pointer;font-family:inherit}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#06080f}::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px}
::selection{background:rgba(82,164,255,0.25);color:#fff}
:root{
  --bg:#06080f;--bg2:#090c15;--bg3:#0d1220;--surf:#101828;--bdr:#1a2d4a;--bdr2:#2a4470;
  --bl:#52a4ff;--bl2:#3b8fe8;--cy:#5ef0ff;--gr:#4ade80;--pu:#c084fc;--pk:#f87171;--yw:#fbbf24;
  --tx:#c0cce0;--tx2:#7a90b0;--tx3:#415070;--wh:#dce8f8;
}
@keyframes heroIn{0%{opacity:0;transform:translateY(48px) scale(0.96)}100%{opacity:1;transform:none}}
@keyframes orb1{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(70px,-50px) scale(1.06)}50%{transform:translate(15px,35px) scale(0.95)}75%{transform:translate(-40px,-15px) scale(1.04)}}
@keyframes orb2{0%,100%{transform:translate(0,0)}33%{transform:translate(-60px,40px) scale(1.05)}66%{transform:translate(50px,-60px) scale(0.94)}}
@keyframes orb3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(35px,45px) scale(1.08)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes drip{0%{transform:scaleY(0);transform-origin:top;opacity:1}60%{transform:scaleY(1);transform-origin:top;opacity:1}100%{transform:scaleY(1);transform-origin:bottom;opacity:0}}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(0.65);opacity:0.5}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes conicSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes pulseGlow{0%{box-shadow:0 0 0 0 rgba(82,164,255,0.55)}70%{box-shadow:0 0 0 16px rgba(82,164,255,0)}100%{box-shadow:0 0 0 0 rgba(82,164,255,0)}}
@keyframes gridIn{from{opacity:0;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}
@keyframes waveBar{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1)}}
@keyframes waveUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:none}}
@keyframes waveLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:none}}
@keyframes waveRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:none}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:none}}
@keyframes borderFlow{0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes ripple{0%{transform:scale(0.8);opacity:1}100%{transform:scale(2.2);opacity:0}}
@keyframes countUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.15)}28%{transform:scale(1)}42%{transform:scale(1.1)}70%{transform:scale(1)}}
.container{max-width:1100px;margin:0 auto;padding:0 2rem}
section{padding:5.5rem 0}
.nav{position:fixed;top:0;left:0;right:0;z-index:500;height:66px;display:flex;align-items:center;transition:all 0.45s cubic-bezier(0.16,1,0.3,1)}
.nav.scrolled{background:rgba(6,8,15,0.82);backdrop-filter:blur(32px) saturate(180%);-webkit-backdrop-filter:blur(32px) saturate(180%);border-bottom:1px solid rgba(82,164,255,0.08);box-shadow:0 1px 0 rgba(82,164,255,0.06),0 8px 48px rgba(0,0,0,0.5)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:1140px;margin:0 auto;padding:0 2rem}
.nav-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;font-weight:800;color:var(--wh);display:flex;align-items:center;gap:0.55rem;letter-spacing:-0.03em;text-decoration:none;cursor:pointer;flex-shrink:0}
.nav-logo-mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--bl),var(--cy));display:flex;align-items:center;justify-content:center;font-size:0.65rem;font-weight:900;color:#06080f;letter-spacing:0;box-shadow:0 0 0 0 rgba(82,164,255,0.5);animation:pulseGlow 3s infinite;position:relative;overflow:hidden}
.nav-logo-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.2),transparent)}
.nav-pill{display:flex;align-items:center;gap:0.1rem;background:rgba(16,24,40,0.7);border:1px solid rgba(82,164,255,0.1);border-radius:100px;padding:0.25rem 0.35rem;backdrop-filter:blur(12px);list-style:none;transition:border-color 0.3s}
.nav-pill:hover{border-color:rgba(82,164,255,0.22)}
.nav-pill a{position:relative;display:flex;align-items:center;padding:0.38rem 0.85rem;border-radius:100px;font-size:0.68rem;letter-spacing:0.06em;color:var(--tx2);transition:all 0.22s;white-space:nowrap}
.nav-pill a:hover{color:var(--wh);background:rgba(82,164,255,0.08)}
.nav-pill a.active{color:var(--wh);background:rgba(82,164,255,0.14);box-shadow:0 0 0 1px rgba(82,164,255,0.25) inset}
.nav-right{display:flex;align-items:center;gap:0.7rem;flex-shrink:0}
.nav-status{display:flex;align-items:center;gap:0.4rem;padding:0.3rem 0.75rem;background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.2);border-radius:100px;font-size:0.6rem;color:var(--gr);letter-spacing:0.08em}
.nav-status-dot{width:5px;height:5px;border-radius:50%;background:var(--gr);animation:pulseDot 2s infinite;flex-shrink:0}
.nav-hire{padding:0.45rem 1.2rem;background:linear-gradient(135deg,var(--bl),var(--cy));background-size:200%;color:#06080f;border:none;border-radius:100px;font-size:0.68rem;font-weight:700;letter-spacing:0.07em;transition:all 0.3s;font-family:inherit;animation:gradShift 5s infinite;white-space:nowrap}
.nav-hire:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(82,164,255,0.5)}
.nav-hamburger{display:none;flex-direction:column;gap:5px;background:rgba(16,24,40,0.7);border:1px solid rgba(82,164,255,0.12);border-radius:8px;padding:8px 9px;cursor:pointer;transition:all 0.25s}
.nav-hamburger:hover{border-color:rgba(82,164,255,0.35)}
.nav-hamburger span{display:block;width:18px;height:1.5px;background:var(--tx2);border-radius:2px;transition:all 0.38s cubic-bezier(0.25,0.46,0.45,0.94)}
.mob-nav-overlay{position:fixed;inset:0;z-index:490;background:rgba(6,8,15,0.6);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity 0.35s}
.mob-nav-overlay.open{opacity:1;pointer-events:all}
.mob-nav{position:fixed;top:0;right:0;bottom:0;z-index:495;width:min(320px,85vw);background:rgba(10,14,24,0.97);backdrop-filter:blur(32px);border-left:1px solid rgba(82,164,255,0.1);display:flex;flex-direction:column;padding:1.5rem;transform:translateX(100%);transition:transform 0.42s cubic-bezier(0.16,1,0.3,1);pointer-events:none}
.mob-nav.open{transform:translateX(0);pointer-events:all}
.mob-nav-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid rgba(82,164,255,0.08)}
.mob-nav-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:1.05rem;font-weight:800;color:var(--wh);display:flex;align-items:center;gap:0.5rem}
.mob-nav-close{width:32px;height:32px;border-radius:8px;background:rgba(82,164,255,0.07);border:1px solid rgba(82,164,255,0.15);display:flex;align-items:center;justify-content:center;font-size:0.9rem;color:var(--tx2);cursor:pointer;transition:all 0.2s}
.mob-nav-close:hover{background:rgba(82,164,255,0.15);color:var(--wh)}
.mob-nav-links{display:flex;flex-direction:column;gap:0.3rem;flex:1}
.mob-nav-links a{display:flex;align-items:center;gap:0.8rem;padding:0.85rem 1rem;border-radius:10px;font-family:'Bricolage Grotesque',sans-serif;font-size:1.1rem;font-weight:700;color:var(--tx2);transition:all 0.22s}
.mob-nav-links a:hover,.mob-nav-links a.active{color:var(--wh);background:rgba(82,164,255,0.08);padding-left:1.3rem}
.mob-nav-links a.active{color:var(--bl)}
.mob-nav-footer{margin-top:auto;padding-top:1.5rem;border-top:1px solid rgba(82,164,255,0.08)}
.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding-top:62px}
.hero-dots{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(82,164,255,0.13) 1px,transparent 1px);background-size:30px 30px;animation:gridIn 1.2s ease 0.2s both;mask-image:radial-gradient(ellipse 85% 80% at 50% 40%,black 25%,transparent 100%);pointer-events:none}
.orb{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;will-change:transform}
.orb-1{width:580px;height:580px;background:radial-gradient(circle,rgba(82,164,255,0.1),transparent 68%);top:-160px;right:-80px;animation:orb1 20s ease-in-out infinite}
.orb-2{width:440px;height:440px;background:radial-gradient(circle,rgba(192,132,252,0.08),transparent 68%);bottom:60px;left:-130px;animation:orb2 26s ease-in-out infinite}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(94,240,255,0.06),transparent 68%);top:38%;right:18%;animation:orb3 16s ease-in-out infinite 2s}
.hero-waves{position:absolute;right:4rem;top:50%;transform:translateY(-50%);display:flex;gap:4px;align-items:center;opacity:0.18;animation:heroIn 1s 0.9s ease both}
.hero-wave-bar{width:3px;border-radius:2px;background:linear-gradient(to top,var(--bl),var(--cy));transform-origin:bottom}
.hero-content{position:relative;z-index:2;max-width:780px}
.hero-badge{display:inline-flex;align-items:center;gap:0.6rem;background:rgba(82,164,255,0.06);border:1px solid rgba(82,164,255,0.22);border-radius:100px;padding:0.35rem 1.1rem;font-size:0.65rem;letter-spacing:0.14em;color:var(--bl);margin-bottom:2rem;animation:heroIn 0.7s ease both}
.hero-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--cy);animation:pulseDot 2s infinite}
.hero-name{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(3.3rem,7.8vw,6.2rem);font-weight:800;line-height:0.93;letter-spacing:-0.038em;color:var(--wh);margin-bottom:0.4rem;animation:heroIn 0.8s 0.08s ease both}
.hero-name-grad{display:block;background:linear-gradient(110deg,var(--bl) 0%,var(--cy) 40%,var(--pu) 80%);background-size:200% 200%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:gradShift 5s ease infinite}
.hero-role-row{display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem;flex-wrap:wrap;animation:heroIn 0.8s 0.16s ease both}
.hero-role-pre{font-size:clamp(0.9rem,2vw,1.15rem);color:var(--tx2);font-family:'Bricolage Grotesque',sans-serif}
.hero-typed{font-size:clamp(0.85rem,2vw,1.05rem);color:var(--cy);font-family:'JetBrains Mono',monospace;min-width:220px}
.hero-cursor{display:inline-block;width:2px;height:1.1em;background:var(--cy);margin-left:2px;vertical-align:middle;animation:blink 1s step-end infinite}
.hero-desc{font-size:0.82rem;color:var(--tx2);max-width:540px;line-height:2.05;margin-bottom:2.2rem;animation:heroIn 0.8s 0.22s ease both}
.hero-ctas{display:flex;gap:0.8rem;flex-wrap:wrap;animation:heroIn 0.8s 0.28s ease both}
.btn{display:inline-flex;align-items:center;gap:0.5rem;padding:0.82rem 1.75rem;border-radius:9px;font-family:inherit;font-size:0.78rem;font-weight:600;letter-spacing:0.05em;transition:all 0.28s;border:none}
.btn-prime{background:linear-gradient(135deg,var(--bl),var(--cy));background-size:200%;color:#06080f;animation:gradShift 5s infinite}
.btn-prime:hover{transform:translateY(-3px);box-shadow:0 12px 38px rgba(82,164,255,0.42)}
.btn-ghost{background:transparent;color:var(--tx);border:1px solid var(--bdr2)}
.btn-ghost:hover{border-color:var(--bl);color:var(--bl);transform:translateY(-3px);box-shadow:0 6px 24px rgba(82,164,255,0.12)}
.btn svg{width:14px;height:14px;flex-shrink:0}
.hero-stats{display:flex;gap:0.8rem;margin-top:3rem;flex-wrap:wrap;animation:heroIn 0.8s 0.38s ease both}
.hero-stat{display:flex;flex-direction:column;padding:0.85rem 1.4rem;background:rgba(16,24,40,0.7);border:1px solid var(--bdr);border-radius:10px;backdrop-filter:blur(12px);transition:all 0.3s}
.hero-stat:hover{border-color:var(--bdr2);transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,0.35)}
.hero-stat-val{font-family:'Bricolage Grotesque',sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;line-height:1;background:linear-gradient(135deg,var(--wh),var(--bl));-webkit-background-clip:text;background-clip:text;color:transparent}
.hero-stat-lbl{font-size:0.57rem;color:var(--tx3);letter-spacing:0.1em;margin-top:0.28rem}
.hero-scroll{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0.6rem;color:var(--tx3);font-size:0.54rem;letter-spacing:0.22em;animation:heroIn 0.7s 2s ease both}
.hero-scroll-track{width:1px;height:52px;background:var(--bdr2);position:relative;overflow:hidden}
.hero-scroll-drop{position:absolute;inset:0;background:linear-gradient(to bottom,var(--bl),transparent);animation:drip 2.2s ease-in-out infinite}
.hero-inner{display:grid;grid-template-columns:1fr auto;gap:3rem;align-items:center;width:100%}
.hero-avatar-col{display:flex;flex-direction:column;align-items:center;gap:1rem;animation:heroIn 0.9s 0.5s ease both;flex-shrink:0}
.hero-avatar-wrap{position:relative;width:260px;height:260px}
.hero-avatar-ring{position:absolute;inset:-3px;border-radius:50%;background:conic-gradient(from 0deg,var(--bl) 0%,var(--cy) 30%,var(--pu) 60%,var(--bl) 100%);animation:conicSpin 5s linear infinite}
.hero-avatar-ring2{position:absolute;inset:-10px;border-radius:50%;background:conic-gradient(from 180deg,transparent,rgba(82,164,255,0.2),transparent);animation:conicSpin 9s linear infinite reverse}
.hero-avatar-scene{position:absolute;inset:3px;border-radius:50%;background:radial-gradient(ellipse at 50% 35%,#142040 0%,#0a1628 50%,#060e1c 100%);border:2.5px solid rgba(6,8,15,0.9);display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:0 0 50px rgba(82,164,255,0.1) inset,0 0 80px rgba(94,240,255,0.05) inset}
.hero-avatar-scene svg{width:108%;height:108%;margin-bottom:-5%}
.hero-avatar-badge{display:flex;align-items:center;gap:0.45rem;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.25);border-radius:100px;padding:0.32rem 0.9rem;font-size:0.6rem;letter-spacing:0.1em;color:var(--gr)}
.hero-avatar-badge-dot{width:5px;height:5px;border-radius:50%;background:var(--gr);animation:pulseDot 2s infinite}
.hero-avatar-links{display:flex;gap:0.45rem}
.hero-avatar-link{width:32px;height:32px;border-radius:9px;background:rgba(16,24,40,0.8);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all 0.25s}
.hero-avatar-link:hover{border-color:var(--bl);color:var(--bl);transform:translateY(-3px);box-shadow:0 6px 18px rgba(82,164,255,0.2)}
.hero-avatar-link svg{width:14px;height:14px}
.marquee-wrap{overflow:hidden;background:linear-gradient(90deg,var(--surf),rgba(16,24,40,0.6));border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);padding:0.65rem 0}
.marquee-track{display:flex;gap:2.2rem;animation:marquee 28s linear infinite;white-space:nowrap;width:max-content}
.marquee-track span{font-size:0.6rem;color:var(--tx3);letter-spacing:0.13em;text-transform:uppercase}
.msep{color:var(--bdr2)}
.sec-tag{display:inline-flex;align-items:center;gap:0.5rem;font-size:0.58rem;letter-spacing:0.22em;color:var(--bl);text-transform:uppercase;margin-bottom:0.7rem}
.sec-tag::before{content:'//';font-size:0.62rem;opacity:0.55}
.sec-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(1.9rem,4vw,2.9rem);font-weight:800;letter-spacing:-0.025em;color:var(--wh);margin-bottom:0.8rem;line-height:1.1}
.sec-sub{font-size:0.8rem;color:var(--tx2);max-width:460px;line-height:1.9}
.rv{opacity:0;will-change:transform,opacity;pointer-events:none}
.rv.up{transform:translateY(40px)}.rv.left{transform:translateX(-40px)}.rv.right{transform:translateX(40px)}.rv.sc{transform:scale(0.91)}
.rv.vis{opacity:1;transform:none;pointer-events:all;transition:opacity 0.8s cubic-bezier(0.16,1,0.3,1),transform 0.8s cubic-bezier(0.16,1,0.3,1)}
#about{background:var(--bg)}
.about-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:4rem;align-items:start}
.about-text p{font-size:0.81rem;color:var(--tx2);line-height:2.08;margin-bottom:0.95rem}
.about-text p strong{color:var(--wh)}.about-text .hl{color:var(--cy)}
.about-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-top:1.4rem}
.about-tag{padding:0.27rem 0.68rem;background:rgba(82,164,255,0.04);border:1px solid var(--bdr);border-radius:5px;font-size:0.61rem;color:var(--tx2);transition:all 0.25s}
.about-tag:hover{background:rgba(82,164,255,0.1);border-color:rgba(82,164,255,0.4);color:var(--bl);transform:translateY(-2px)}
.about-card{position:relative;border-radius:16px;overflow:hidden}
.about-card-ring{position:absolute;inset:-1px;border-radius:17px;background:conic-gradient(from 0deg,transparent,var(--bl) 20%,transparent 40%,transparent 60%,var(--cy) 80%,transparent 100%);animation:conicSpin 5.5s linear infinite;opacity:0.35;pointer-events:none}
.about-card-body{position:relative;z-index:1;background:var(--surf);margin:1px;border-radius:15px;padding:1.8rem}
.about-metric{display:flex;justify-content:space-between;align-items:center;padding:0.78rem 0;border-bottom:1px solid rgba(26,45,74,0.55)}
.about-metric:last-child{border-bottom:none;padding-bottom:0}
.about-metric-label{font-size:0.67rem;color:var(--tx2)}
.about-metric-val{font-family:'Bricolage Grotesque',sans-serif;font-size:0.92rem;font-weight:700;color:var(--wh)}
.about-metric-val.blue{color:var(--bl)}.about-metric-val.green{color:var(--gr)}
#education{background:var(--bg2)}
.edu-timeline{position:relative;padding-left:2.5rem;margin-top:3rem}
.edu-timeline::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--bl),rgba(82,164,255,0.1));border-radius:2px}
.edu-item{position:relative;margin-bottom:2.2rem;opacity:0;transform:translateX(-20px);transition:opacity 0.6s cubic-bezier(0.16,1,0.3,1),transform 0.6s cubic-bezier(0.16,1,0.3,1)}
.edu-item.vis{opacity:1;transform:translateX(0)}
.edu-item:last-child{margin-bottom:0}
.edu-dot{position:absolute;left:-2.85rem;top:6px;width:14px;height:14px;border-radius:50%;border:2px solid var(--bg2);flex-shrink:0;box-shadow:0 0 0 3px rgba(82,164,255,0.2)}
.edu-card{background:var(--surf);border:1px solid var(--bdr);border-radius:14px;padding:1.4rem 1.6rem;transition:border-color 0.3s,transform 0.3s,box-shadow 0.3s;position:relative;overflow:hidden}
.edu-card::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:var(--edu-color,var(--bl))}
.edu-card:hover{border-color:var(--bdr2);transform:translateX(4px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.edu-period{font-size:0.6rem;color:var(--bl);letter-spacing:0.12em;margin-bottom:0.5rem;display:flex;align-items:center;gap:0.4rem}
.edu-period-dot{width:4px;height:4px;border-radius:50%;background:var(--bl);flex-shrink:0}
.edu-degree{font-family:'Bricolage Grotesque',sans-serif;font-size:1.05rem;font-weight:800;color:var(--wh);margin-bottom:0.25rem;letter-spacing:-0.015em}

/* ══ HOOKS ══ */
function useTyping(words,speed=82,pause=2300){
  const[text,setText]=useState('');const[idx,setIdx]=useState(0);const[char,setChar]=useState(0);const[del,setDel]=useState(false);
  useEffect(()=>{
    const word=words[idx];let t;
    if(!del&&char<word.length){t=setTimeout(()=>{setText(word.slice(0,char+1));setChar(c=>c+1)},speed)}
    else if(!del&&char===word.length){t=setTimeout(()=>setDel(true),pause)}
    else if(del&&char>0){t=setTimeout(()=>{setText(word.slice(0,char-1));setChar(c=>c-1)},speed/2)}
    else if(del&&char===0){setDel(false);setIdx(i=>(i+1)%words.length)}
    return()=>clearTimeout(t);
  },[text,del,char,idx,words,speed,pause]);
  return text;
}
function useIO(ref,opts={threshold:0.05}){
  const[vis,setVis]=useState(false);
  useEffect(()=>{const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true)},{...opts,rootMargin:'0px 0px -20px 0px'});if(ref.current)o.observe(ref.current);return()=>o.disconnect()},[]);
  return vis;
}
function useSpy(ids){
  const[active,setActive]=useState('hero');
  useEffect(()=>{
    const h=()=>{const y=window.scrollY+95;for(const id of[...ids].reverse()){const el=document.getElementById(id);if(el&&el.offsetTop<=y){setActive(id);break}}};
    window.addEventListener('scroll',h,{passive:true});return()=>window.removeEventListener('scroll',h);
  },[]);
  return active;
}
function Rv({children,cls='',delay=0,dir='up'}){
  const ref=useRef(null);const vis=useIO(ref);
  return<div ref={ref} className={`rv ${dir} ${vis?'vis':''} ${cls}`} style={{transitionDelay:`${delay}ms`}}>{children}</div>;
}
function SBar({pct,color='blue',delay=0}){
  const ref=useRef(null);const vis=useIO(ref);
  return<div ref={ref} className="skill-bar"><div className={`skill-bar-fill ${color}`} style={{width:vis?`${pct}%`:'0',transitionDelay:`${delay}ms`}}/></div>;
}
function DBar({pct,color,delay=0}){
  const ref=useRef(null);const vis=useIO(ref);
  return<div className="dsa-bar-track"><div ref={ref} className={`dsa-bar-fill ${color}`} style={{width:vis?`${pct}%`:'0',transitionDelay:`${delay}ms`}}/></div>;
}

      <div className="chat-header">
        <div className="chat-header-info">
          <div className="chat-avatar">🤖</div>
          <div><div className="chat-hname">Ayush's AI Assistant</div><div className="chat-status"><div className="chat-status-dot"/>Online · Knows full CV</div></div>
        </div>
        <button className="chat-close" onClick={()=>setOpen(false)}>✕</button>
      </div>
      <div className="chat-msgs" ref={msgsRef}>
        {msgs.map((m,i)=><div key={i} className={`chat-msg ${m.r}`} dangerouslySetInnerHTML={{__html:m.h}}/>)}
        {thinking&&<div className="chat-msg bot" style={{color:'var(--tx3)'}}>
          {[0,0.2,0.4].map((d,i)=><span key={i} style={{animation:`blink 1s step-end ${d}s infinite`,marginRight:'2px'}}>●</span>)}
        </div>}
        {msgs.length===1&&<div style={{alignSelf:'flex-start'}}><div className="chat-quickbtns">{quickBtns.map(q=><button key={q} className="chat-quick" onClick={()=>send(q)}>{q}</button>)}</div></div>}
      </div>
      <div className="chat-input-row">
        <input className="chat-input" placeholder="Ask anything about Ayush..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send(inp)}/>
        <button className="chat-send" onClick={()=>send(inp)}>
          <svg viewBox="0 0 16 16" fill="currentColor" style={{width:13,height:13,color:'#06080f'}}><path d="M15.854.146a.5.5 0 01.11.54l-5.819 14.547a.75.75 0 01-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 01.124-1.33L15.314.037a.5.5 0 01.54.11z"/></svg>
        </button>
      </div>
    </div>
    <button className="chat-fab" onClick={()=>setOpen(o=>!o)} title="Chat with Ayush's assistant">{open?'✕':'💬'}</button>
  </>);
}

function App(){
  return(<>
    <Nav/><Hero/><Marquee/><About/><Education/><Skills/><Projects/><DSA/><Certifications/><Volunteering/><Resume/><Contact/>
    <footer><div className="footer-txt">Designed &amp; built with <span className="footer-heart">♥</span> by <strong style={{color:'var(--wh)'}}>Ayush Amrit</strong> · 2025</div></footer>
    <Chatbot/>
  </>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
